services:
  kypost-server:
    build: .
    container_name: KyPost-Server
    ports:
      - "5866:5866"
    #  - "11434:11434"  #Uncomment to expose Ollama API
    environment:
      WEB_PORT: 5866
      TZ: ${TZ:-America/New_York}
      SECRET_DIR: ${SECRET_DIR:-/kypost/private}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://127.0.0.1:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:e4b}
      TUNING_FILE: ${TUNING_FILE:-/kypost/config/TUNING.md}
      SERVER_BASE_URL: ${SERVER_BASE_URL:-}
      PAIRING_SECRET: ${PAIRING_SECRET:-}
      CAPTCHA_PROVIDER: ${CAPTCHA_PROVIDER:-}
      CAPTCHA_SITE_KEY: ${CAPTCHA_SITE_KEY:-}
      CAPTCHA_SECRET_KEY: ${CAPTCHA_SECRET_KEY:-}
      PUSH_RELAY_URL: ${PUSH_RELAY_URL:-}
      PUSH_RELAY_KEY: ${PUSH_RELAY_KEY:-}
      PUSH_RELAY_KEY_FILE: ${PUSH_RELAY_KEY_FILE:-}
      APNS_RELAY_URL: ${APNS_RELAY_URL:-}
      APNS_RELAY_KEY: ${APNS_RELAY_KEY:-}
      APNS_RELAY_KEY_FILE: ${APNS_RELAY_KEY_FILE:-}
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - kypost_config:/kypost/config
      - kypost_private:/kypost/private
      - kypost_logs:/kypost/logs
      - kypost_state:/kypost/state
      - ${OLLAMA_MODELS_HOST_DIR:-./share/ollama/models}:/kypost/ollama-models
    restart: unless-stopped

volumes:
  kypost_config:
  kypost_private:
  kypost_logs:
  kypost_state:
