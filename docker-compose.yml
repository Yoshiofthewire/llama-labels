services:
  llama-lab:
    build: .
    container_name: llama-lab
    ports:
      - "5866:5866"
    #  - "11434:11434"  #Uncomment to expose Ollama API
    environment:
      WEB_PORT: 5866
      TZ: ${TZ:-America/New_York}
      SECRET_DIR: ${SECRET_DIR:-/llama_lab/private}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://127.0.0.1:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:e4b}
     # OLLAMA_MODEL: ${OLLAMA_MODEL:-nemotron-3-nano:4b}
      TUNING_FILE: ${TUNING_FILE:-/llama_lab/config/TUNING.md}
      SERVER_BASE_URL: ${SERVER_BASE_URL:-}
      PAIRING_SECRET: ${PAIRING_SECRET:-}
      PUSH_RELAY_URL: ${PUSH_RELAY_URL:-}
      PUSH_RELAY_KEY: ${PUSH_RELAY_KEY:-}
      PUSH_RELAY_KEY_FILE: ${PUSH_RELAY_KEY_FILE:-}
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - llama_config:/llama_lab/config
      - llama_private:/llama_lab/private
      - llama_logs:/llama_lab/logs
      - llama_state:/llama_lab/state
      - ${OLLAMA_MODELS_HOST_DIR:-./share/ollama/models}:/llama_lab/ollama-models
    restart: unless-stopped

volumes:
  llama_config:
  llama_private:
  llama_logs:
  llama_state:
