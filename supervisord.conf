[unix_http_server]
file=/llama_lab/state/supervisor.sock
chmod=0700
chown=llamalab:llamalab

[supervisord]
nodaemon=true
user=llamalab
logfile=/llama_lab/logs/supervisord.log
pidfile=/llama_lab/state/supervisord.pid

[rpcinterface:supervisor]
supervisor.rpcinterface_factory=supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///llama_lab/state/supervisor.sock

[program:bootstrap]
command=/bin/sh /opt/llama-lab/scripts/bootstrap.sh
autostart=true
autorestart=false
startsecs=0
priority=1
stdout_logfile=/llama_lab/logs/bootstrap.log
stderr_logfile=/llama_lab/logs/bootstrap.err.log

[program:api]
command=/usr/local/bin/llama-lab --mode server
autostart=true
autorestart=true
startsecs=3
priority=10
stdout_logfile=/llama_lab/logs/api.log
stderr_logfile=/llama_lab/logs/api.err.log

[program:daemon]
command=/usr/local/bin/llama-lab --mode daemon
autostart=true
autorestart=true
startsecs=3
priority=10
stdout_logfile=/llama_lab/logs/daemon.log
stderr_logfile=/llama_lab/logs/daemon.err.log

[program:ollama]
command=/bin/bash -c "set -o pipefail; /bin/sh /opt/llama-lab/scripts/start-ollama.sh 2>&1 | while IFS= read -r line; do echo \"[$(date '+%%Y-%%m-%%d %%H:%%M:%%S')] $line\"; done"
environment=HOME="/home/llamalab",OLLAMA_MODELS="/llama_lab/ollama-models"
autostart=true
autorestart=true
startsecs=3
priority=10
stdout_logfile=/llama_lab/logs/llama.log
stderr_logfile=/llama_lab/logs/llama.err.log

[program:ollama-model]
command=/bin/sh /opt/llama-lab/scripts/pull-ollama-model.sh
environment=HOME="/home/llamalab",OLLAMA_MODELS="/llama_lab/ollama-models"
autostart=true
autorestart=false
startsecs=0
priority=11
stdout_logfile=/llama_lab/logs/llama.log
stderr_logfile=/llama_lab/logs/llama.err.log
